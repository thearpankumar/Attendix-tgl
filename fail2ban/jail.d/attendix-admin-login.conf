# Network-level backstop behind the app's own per-IP (rateLimiter.js) and
# per-account (Admin.failedLoginAttempts) defenses. maxretry is higher than
# the app-level 5 on purpose: this jail also catches one IP cycling through
# multiple different usernames, each individually under its own lockout
# threshold.
#
# chain=DOCKER-USER is required, not optional: Caddy's ports are published
# via normal Docker bridge port-mapping, so bans on the default INPUT chain
# never actually reach traffic destined for the container.
[attendix-admin-login]
enabled = true
filter = attendix-admin-login
logpath = /var/log/caddy/access.log
backend = auto
findtime = 900
maxretry = 10
bantime = 3600
action = iptables-multiport[name=attendix-admin, chain=DOCKER-USER, port="http,https", protocol=tcp]
