# Matches failed admin login/registration attempts in Caddy's JSON access log
# (see Caddyfile / Caddyfile.prod `log` block). Field order/names verified
# against Caddy's documented default access-log schema (request.remote_ip,
# request.uri, top-level status) — re-check against a real log line on first
# deploy, since this hasn't been run against live traffic yet.
[Definition]
datepattern = "ts":<DATE>\.
failregex = ^.*"remote_ip":"<HOST>".*"uri":"/api/admin/(login|register)".*"status":(401|403).*$
ignoreregex =
